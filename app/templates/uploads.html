<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Uploaded Files</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
    body{ padding:20px; background:#f7f9fc; }
    .btn-custom{ background:#4e73df; color:#fff; padding:8px 18px; border-radius:6px; text-decoration:none; margin-right:10px; }
    .btn-custom:hover{ opacity:0.9; }
    table{ background:#fff; border-radius:6px; padding:10px; width:100%; border-collapse:collapse; }
    th, td{ padding:10px; border-bottom:1px solid #ddd; text-align:left; }
  </style>
</head>
<body>
<div class="container">
  <h2>Uploaded Files</h2>
  <p>Fake: {{ fake_count }}, Real: {{ real_count }}</p>

  <table>
    <thead>
      <tr>
        <th>Filename</th>
        <th>Label</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.filename }}</td>
        <td>{{ row.label }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <div style="margin-top:20px;">
    <a href="{{ url_for('dashboard') }}" class="btn-custom">Back</a>
  </div>
</div>
</body>
</html>
