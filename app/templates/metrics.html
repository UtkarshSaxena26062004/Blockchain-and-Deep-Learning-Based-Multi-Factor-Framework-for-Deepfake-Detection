<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Model Metrics</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style> body{ padding: 20px; } .cm-img{ max-width:100%; border:1px solid #ddd; padding:8px; background:#fff; } </style>
</head>
<body>
  <div class="container">
    <h2>Model Metrics</h2>
    <div class="row">
      <div class="col-md-6">
        <h5>Confusion Matrix (counts)</h5>
        <img class="cm-img" src="data:image/png;base64,{{ cm_img_counts }}" alt="Confusion Matrix counts">
      </div>
      <div class="col-md-6">
        <h5>Normalized Confusion Matrix</h5>
        <img class="cm-img" src="data:image/png;base64,{{ cm_img_norm }}" alt="Confusion Matrix normalized">
      </div>
    </div>

    <h3 class="mt-4">Classification Report</h3>
    <div class="report-table">
      {{ report_table | safe }}
    </div>

    <div class="mt-4">
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back</a>
    </div>
  </div>
</body>
</html>
